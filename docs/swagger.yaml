basePath: /api/v1
definitions:
  domain.PermissionMask:
    enum:
    - 0
    format: int64
    type: integer
    x-enum-varnames:
    - DefaultPermissionMask
  dto.AccountRole:
    properties:
      id:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      parent_id:
        type: string
      permission:
        $ref: '#/definitions/domain.PermissionMask'
    type: object
  dto.AddGroupMemberRequest:
    properties:
      users:
        items:
          type: string
        type: array
    type: object
  dto.AddGroupMemberResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/dto.GroupMember'
        type: array
    type: object
  dto.CreateAccountRoleRequest:
    properties:
      is_default:
        type: boolean
      name:
        type: string
      parent_id:
        type: string
      permission:
        $ref: '#/definitions/domain.PermissionMask'
    type: object
  dto.CreateAccountRoleResponse:
    properties:
      account_role:
        $ref: '#/definitions/dto.AccountRole'
    type: object
  dto.CreateGroupRoleRequest:
    properties:
      is_default:
        type: boolean
      name:
        type: string
      permission_mask:
        $ref: '#/definitions/domain.PermissionMask'
    type: object
  dto.CreateGroupRoleResponse:
    properties:
      role:
        $ref: '#/definitions/dto.GroupRole'
    type: object
  dto.CreateUserGroupRequest:
    properties:
      name:
        maxLength: 64
        type: string
      users:
        items:
          type: string
        type: array
    required:
    - name
    - users
    type: object
  dto.CreateUserGroupResponse:
    properties:
      id:
        type: string
      name:
        type: string
      users:
        items:
          $ref: '#/definitions/dto.GroupMember'
        type: array
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        maxLength: 64
        type: string
      name:
        maxLength: 64
        minLength: 2
        type: string
      surname:
        maxLength: 64
        minLength: 2
        type: string
    required:
    - email
    - name
    - surname
    type: object
  dto.CreateUserResponse:
    properties:
      user:
        $ref: '#/definitions/dto.User'
    type: object
  dto.ErrorMessage:
    properties:
      message:
        type: string
    type: object
  dto.GetVideoResponse:
    properties:
      presigned_url:
        type: string
    type: object
  dto.GroupMember:
    properties:
      group_id:
        type: string
      role_id:
        type: string
      user_id:
        type: string
    type: object
  dto.GroupRole:
    properties:
      account_id:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      permission_mask:
        $ref: '#/definitions/domain.PermissionMask'
    type: object
  dto.GetAllUsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/dto.User'
        type: array
    type: object
  dto.GetAllVideosResponse:
    properties:
      videos:
        items:
          $ref: '#/definitions/dto.Video'
        type: array
    type: object
  dto.LoginRequest:
    properties:
      email:
        maxLength: 64
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 64
        type: string
      name:
        maxLength: 64
        minLength: 2
        type: string
      surname:
        maxLength: 64
        minLength: 2
        type: string
    required:
    - email
    - name
    - surname
    type: object
  dto.RegisterResponse:
    type: object
  dto.RenameVideoRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.RenameVideoResponse:
    properties:
      video:
        $ref: '#/definitions/dto.Video'
    type: object
  dto.UpdateUserRequest:
    properties:
      role_id:
        type: string
    type: object
  dto.UpdateUserResponse:
    properties:
      user:
        $ref: '#/definitions/dto.User'
    type: object
  dto.UploadVideoResponse:
    properties:
      presigned_url:
        type: string
    type: object
  dto.User:
    properties:
      deactivated_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role_id:
        type: string
      status:
        type: string
      surname:
        type: string
    type: object
  dto.Video:
    properties:
      author:
        type: string
      created_at:
        type: string
      group_id:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: integer
    type: object
  dto.GetAllUserGroupsResponse:
    properties:
      groups:
        items:
          $ref: '#/definitions/dto.UserGroup'
        type: array
    type: object
  dto.UserGroup:
    properties:
      account_id:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для управления внутренней видео документацией Vilib.
  title: Vilib API
  version: "1.0"
paths:
  /api/v1/accounts/{accountId}/roles:
    get:
      description: Возвращает список всех ролей аккаунта
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AccountRole'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Список ролей аккаунта
      tags:
      - account_roles
    post:
      consumes:
      - application/json
      description: Создаёт новую роль для аккаунта с указанными правами
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: Тело запроса для создания роли
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAccountRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateAccountRoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Создание роли аккаунта
      tags:
      - account_roles
  /api/v1/accounts/{accountId}/roles/{roleId}:
    delete:
      description: Удаляет роль аккаунта. Нельзя удалить системную роль или роль,
        назначенную активным пользователям.
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID роли
        in: path
        name: roleId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Удаление роли аккаунта
      tags:
      - account_roles
  /api/v1/accounts/{accountId}/user-groups:
    get:
      description: Возвращает список групп пользователей аккаунта
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetAllUserGroupsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Список групп пользователей
      tags:
      - user_groups
    post:
      consumes:
      - application/json
      description: Создаёт новую группу пользователей и добавляет указанных пользователей
        в неё
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: Тело запроса для создания группы
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateUserGroupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Создание группы пользователей
      tags:
      - user_groups
  /api/v1/accounts/{accountId}/user-groups/{groupId}/members:
    post:
      consumes:
      - application/json
      description: Добавляет указанных пользователей в существующую группу
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы пользователей
        in: path
        name: groupId
        required: true
        type: string
      - description: Тело запроса для добавления участников
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddGroupMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AddGroupMemberResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Добавление участников в группу
      tags:
      - user_groups
  /api/v1/accounts/{accountId}/user-groups/{groupId}/video:
    post:
      consumes:
      - application/json
      description: Возвращает преподписанный URL для загрузки видео в S3
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы пользователей
        in: path
        name: groupId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UploadVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Загрузка видео
      tags:
      - videos
  /api/v1/accounts/{accountId}/user-groups/{groupId}/video/{videoId}:
    get:
      consumes:
      - application/json
      description: Возвращает преподписанный URL для доступа к видео
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы пользователей
        in: path
        name: groupId
        required: true
        type: string
      - description: ID видео
        in: path
        name: videoId
        required: true
        type: string
      - description: Предпочитать оригинальное видео
        in: query
        name: prefer_original
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Получение видео
      tags:
      - videos
  /api/v1/accounts/{accountId}/user-groups/{userGroupId}:
    delete:
      description: Каскадно удаляет группу вместе со всеми видео, участниками и ассетами
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы
        in: path
        name: userGroupId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Удаление группы пользователей
      tags:
      - user_groups
  /api/v1/accounts/{accountId}/user-groups/{userGroupId}/members/{memberId}:
    delete:
      description: Удаляет пользователя из группы
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы
        in: path
        name: userGroupId
        required: true
        type: string
      - description: ID пользователя-участника
        in: path
        name: memberId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Удаление участника группы
      tags:
      - group_members
  /api/v1/accounts/{accountId}/user-groups/{userGroupId}/video/{videoId}:
    delete:
      description: Удаляет видео из группы
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы
        in: path
        name: userGroupId
        required: true
        type: string
      - description: ID видео
        in: path
        name: videoId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Удаление видео
      tags:
      - videos
    put:
      consumes:
      - application/json
      description: Переименовывает видео в группе
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы
        in: path
        name: userGroupId
        required: true
        type: string
      - description: ID видео
        in: path
        name: videoId
        required: true
        type: string
      - description: Тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RenameVideoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RenameVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Переименование видео
      tags:
      - videos
  /api/v1/accounts/{accountId}/user-groups/{userGroupId}/videos:
    get:
      description: Возвращает список видео в группе пользователей
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID группы
        in: path
        name: userGroupId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetAllVideosResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Список видео группы
      tags:
      - videos
  /api/v1/accounts/{accountId}/user-groups/roles:
    get:
      description: Возвращает список всех ролей групп для аккаунта
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.GroupRole'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Список ролей групп
      tags:
      - group_roles
    post:
      consumes:
      - application/json
      description: Создаёт новую роль для группы пользователей с указанными правами
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: Тело запроса для создания роли группы
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateGroupRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateGroupRoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Создание роли группы
      tags:
      - group_roles
  /api/v1/accounts/{accountId}/user-groups/roles/{groupRoleId}:
    delete:
      description: Удаляет роль группы. Нельзя удалить роль, назначенную участникам.
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: ID роли группы
        in: path
        name: groupRoleId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Удаление роли группы
      tags:
      - group_roles
  /api/v1/accounts/{accountId}/users:
    get:
      description: Возвращает список пользователей, привязанных к аккаунту, с опциональной
        фильтрацией по статусу
      parameters:
      - description: ID аккаунта
        in: path
        name: accountId
        required: true
        type: string
      - description: 'Фильтр по статусу: active, deactivated, all (по умолчанию: active)'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetAllUsersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Список пользователей аккаунта
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Создает нового пользователя с указанными данными, привязывает его
        к аккаунту и отправляет email с паролем
      parameters:
      - description: ID аккаунта, к которому привязывается пользователь
        in: path
        name: accountId
        required: true
        type: string
      - description: Тело запроса для создания пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorMessage'
      summary: Создание пользователя
      tags:
      - users
  /api/v1/accounts/{accountId}/users/{userId}:
    delete:
